    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .font-arabic {
        font-family: 'Cairo', sans-serif;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Custom Animations */
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slide-up {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes pop-in {
        0% { transform: scale(0.95); opacity: 0; }
        70% { transform: scale(1.02); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes slide-in-bottom {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }

      .animate-fade { animation: fade-in 0.4s ease-out forwards; }
      .animate-slide-up { animation: slide-up 0.5s ease-out forwards; }
      .animate-pop { animation: pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
      
      /* Utilities commonly used in Shadcn/Animate */
      .animate-in { animation-duration: 300ms; animation-fill-mode: forwards; }
      .fade-in { animation-name: fade-in; }
      .zoom-in-95 { animation-name: pop-in; }
      .slide-in-from-bottom-4 { animation-name: slide-up; }
    </style>
